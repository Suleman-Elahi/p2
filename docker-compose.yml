services:


  redis:
    image: docker.dragonflydb.io/dragonflydb/dragonfly:latest
    ports:
      - "6379:6379"

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./deploy/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./storage:/storage:ro
    depends_on:
      - web

  migrate:
    build: .
    command: ["python", "manage.py", "migrate", "--noinput"]
    env_file: .env
    volumes:
      - .:/app
      - venv:/app/.venv
    environment:
      DJANGO_SETTINGS_MODULE: p2.core.settings
  web:
    build: .
    command: ["uvicorn", "p2.core.asgi:application", "--host", "0.0.0.0", "--port", "8000", "--loop", "uvloop", "--reload", "--reload-dir", "p2"]
    env_file: .env
    volumes:
      - .:/app
      - venv:/app/.venv
      - media:/app/media
      - ./storage:/storage
    ports:
      - "8000:8000"
    environment:
      DJANGO_SETTINGS_MODULE: p2.core.settings
      REDIS_URL: redis://redis:6379/0
      ARQ_REDIS_URL: redis://redis:6379/1
      P2_STORAGE__USE_X_ACCEL_REDIRECT: "true"
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_started

  worker:
    build: .
    command: ["python", "-m", "arq", "p2.core.worker.WorkerSettings"]
    env_file: .env
    volumes:
      - .:/app
      - venv:/app/.venv
      - media:/app/media
      - ./storage:/storage
    environment:
      DJANGO_SETTINGS_MODULE: p2.core.settings
      REDIS_URL: redis://redis:6379/0
      ARQ_REDIS_URL: redis://redis:6379/1
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_started

  grpc:
    build: .
    command: ["python", "manage.py", "grpc"]
    env_file: .env
    volumes:
      - .:/app
      - venv:/app/.venv
      - media:/app/media
      - ./storage:/storage
    ports:
      - "50051:50051"
    environment:
      DJANGO_SETTINGS_MODULE: p2.core.settings
      REDIS_URL: redis://redis:6379/0
      ARQ_REDIS_URL: redis://redis:6379/1
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_started

volumes:

  media:
  venv:
