services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: p2
      POSTGRES_USER: p2
      POSTGRES_PASSWORD: p2
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  migrate:
    build: .
    command: ["python", "manage.py", "migrate", "--noinput"]
    env_file: .env
    volumes:
      - .:/app
      - venv:/app/.venv
    environment:
      DJANGO_SETTINGS_MODULE: p2.core.settings
      DATABASE_URL: postgresql://p2:p2@db:5432/p2
    depends_on:
      - db

  web:
    build: .
    command: ["uvicorn", "p2.core.asgi:application", "--host", "0.0.0.0", "--port", "8000", "--reload", "--reload-dir", "p2"]
    env_file: .env
    volumes:
      - .:/app
      - venv:/app/.venv
      - media:/app/media
      - storage:/storage
    ports:
      - "8000:8000"
    environment:
      DJANGO_SETTINGS_MODULE: p2.core.settings
      DATABASE_URL: postgresql://p2:p2@db:5432/p2
      REDIS_URL: redis://redis:6379/0
      ARQ_REDIS_URL: redis://redis:6379/1
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_started

  worker:
    build: .
    command: ["python", "-m", "arq", "p2.core.worker.WorkerSettings"]
    env_file: .env
    volumes:
      - .:/app
      - venv:/app/.venv
      - media:/app/media
      - storage:/storage
    environment:
      DJANGO_SETTINGS_MODULE: p2.core.settings
      DATABASE_URL: postgresql://p2:p2@db:5432/p2
      REDIS_URL: redis://redis:6379/0
      ARQ_REDIS_URL: redis://redis:6379/1
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_started

  grpc:
    build: .
    command: ["python", "manage.py", "grpc"]
    env_file: .env
    volumes:
      - .:/app
      - venv:/app/.venv
      - media:/app/media
      - storage:/storage
    ports:
      - "50051:50051"
    environment:
      DJANGO_SETTINGS_MODULE: p2.core.settings
      DATABASE_URL: postgresql://p2:p2@db:5432/p2
      REDIS_URL: redis://redis:6379/0
      ARQ_REDIS_URL: redis://redis:6379/1
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_started

volumes:
  postgres_data:
  media:
  storage:
  venv:
