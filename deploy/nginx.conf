server {
    listen 80;
    server_name localhost;

    # Allow large uploads (multipart, big files)
    client_max_body_size 0;

    # Proxy all requests to Uvicorn/Django
    location / {
        proxy_pass http://web:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Support large streaming uploads without buffering
        proxy_request_buffering off;
        proxy_buffering off;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    # Zero-copy reads — Django sets X-Accel-Redirect pointing here.
    # Nginx uses sendfile() to stream directly from NVMe to socket.
    # Python memory stays empty for the entire file transfer.
    location /internal-storage/ {
        internal;
        alias /storage/;
        sendfile on;
        tcp_nopush on;
        tcp_nodelay on;
        aio on;
    }
}
