server {
    listen 80 reuseport;
    server_name localhost;

    # Allow large uploads (multipart, big files)
    client_max_body_size 0;

    # TCP optimizations for low latency
    tcp_nodelay on;
    tcp_nopush on;

    # Increase buffer sizes for high throughput
    proxy_buffer_size 128k;
    proxy_buffers 4 256k;
    proxy_busy_buffers_size 256k;

    # Proxy all requests to Uvicorn/Django
    location / {
        proxy_pass http://web:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";

        # Support large streaming uploads without buffering
        proxy_request_buffering off;
        proxy_buffering off;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    # Static files — served directly by nginx from the shared volume
    location /_/static/ {
        alias /app/static/;
        expires 7d;
        add_header Cache-Control "public";
    }

    # Zero-copy reads — Django sets X-Accel-Redirect pointing here.
    # Nginx uses sendfile() to stream directly from NVMe to socket.
    # Python memory stays empty for the entire file transfer.
    location /internal-storage/ {
        internal;
        alias /storage/;
        
        # Zero-copy optimizations
        sendfile on;
        sendfile_max_chunk 1m;
        tcp_nopush on;
        tcp_nodelay on;
        aio threads;
        directio 4m;
        output_buffers 2 1m;
    }
}
