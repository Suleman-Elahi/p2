server {
    listen 80;
    server_name localhost;

    client_max_body_size 0;
    tcp_nodelay on;
    tcp_nopush on;

    proxy_buffer_size 128k;
    proxy_buffers 4 256k;
    proxy_busy_buffers_size 256k;

    # Silence Chrome DevTools / browser probes
    location = /.well-known/appspecific/com.chrome.devtools.json { return 204; }
    location = /favicon.ico { return 204; }

    # Static files — path substituted by scripts/setup.sh
    location /_/static/ {
        alias /path/to/p2_slim/static/;
        expires 7d;
        add_header Cache-Control "public";
        gzip_static on;
    }

    # Zero-copy blob downloads via X-Accel-Redirect
    location /internal-storage/ {
        internal;
        alias /path/to/p2_slim/storage/;
        sendfile on;
        sendfile_max_chunk 1m;
        tcp_nopush on;
        aio threads;
    }

    # Everything else proxied to uvicorn
    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_request_buffering off;
        proxy_buffering off;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }
}
