upstream uvicorn {
    server 127.0.0.1:8000;
    # Persistent connection pool to uvicorn — eliminates TCP handshake per request.
    # 512 idle keepalive connections across all Nginx workers.
    keepalive 512;
    keepalive_requests 100000;
    keepalive_timeout 65s;
}

server {
    listen 80 reuseport;
    server_name localhost;

    client_max_body_size 0;

    # Silence browser probes
    location = /.well-known/appspecific/com.chrome.devtools.json { return 204; }
    location = /favicon.ico { return 204; }

    # Zero-copy reads — Django returns X-Accel-Redirect pointing here.
    # Nginx uses sendfile() to stream directly from disk to socket.
    location /internal-storage/ {
        internal;
        alias /home/ilfs/Public/p2_slim/storage/;

        sendfile on;
        sendfile_max_chunk 2m;
        tcp_nopush on;
        tcp_nodelay on;
        aio threads;
        directio 512k;
        output_buffers 2 512k;
    }

    location / {
        proxy_pass http://uvicorn;
        proxy_http_version 1.1;
        # Required for upstream keepalive — must clear Connection header
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_request_buffering off;
        proxy_buffering off;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }
}
